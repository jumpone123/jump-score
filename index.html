<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>줄넘기 기록</title>
</head>
<body>
  <h1>줄넘기 기록 입력</h1>

  <input type="text" id="name" placeholder="이름" />
  <input type="number" id="score" placeholder="기록 (횟수)" />
  <button onclick="saveScore()">저장</button>

  <h2>기록 순위</h2>
  <ul id="list"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDczG4H5M0owrhJr3cr_xa_SDiQIBVQgf0",
      authDomain: "jump-score-94507.firebaseapp.com",
      projectId: "jump-score-94507",
      storageBucket: "jump-score-94507.firebasestorage.app",
      messagingSenderId: "1075066204311",
      appId: "1:1075066204311:web:e85a21cba52c4c6a35b9d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveScore = async function () {
      const name = document.getElementById("name").value;
      const score = document.getElementById("score").value;

      if (!name || !score) {
        alert("이름과 점수를 입력하세요");
        return;
      }

      await addDoc(collection(db, "scores"), {
        name: name,
        score: Number(score),
        createdAt: new Date()
      });

      document.getElementById("name").value = "";
      document.getElementById("score").value = "";

      renderScores();
    };

    async function renderScores() {
      const q = query(collection(db, "scores"), orderBy("score", "desc"));
      const querySnapshot = await getDocs(q);

      const list = document.getElementById("list");
      list.innerHTML = "";

      let rank = 1;
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const li = document.createElement("li");
        li.textContent = `${rank}등 - ${data.name}: ${data.score}회`;
        list.appendChild(li);
        rank++;
      });
    }

    renderScores();
  </script>
</body>
</html>
