<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>점프 기록</title>
</head>
<body>

  <h1>줄넘기 기록 입력</h1>

  <input type="text" id="name" placeholder="이름">
  <input type="number" id="score" placeholder="기록 (횟수)">
  <button onclick="saveScore()">저장</button>

  <h2>기록 순위</h2>
  <ul id="list"></ul>

  <script>
    function saveScore() {
      const name = document.getElementById('name').value;
      const score = document.getElementById('score').value;

      if (!name || !score) {
        alert("이름과 기록 입력해!");
        return;
      }

      let data = JSON.parse(localStorage.getItem("scores")) || [];

      data.push({ name, score: Number(score) });

      data.sort((a, b) => b.score - a.score);

      localStorage.setItem("scores", JSON.stringify(data));

      render();
    }

    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      let data = JSON.parse(localStorage.getItem("scores")) || [];

      data.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerText = `${index + 1}등 - ${item.name}: ${item.score}회`;
        list.appendChild(li);
      });
    }

    render();
  </script>

</body>
</html>
